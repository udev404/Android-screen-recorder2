name: Build APK from pro.zip

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract pro.zip
        run: |
          unzip pro.zip
          echo "=== Extracted files ==="
          ls -la
          
          # ScreenCastPro klasörü varsa içine gir
          if [ -d "ScreenCastPro" ]; then
            cd ScreenCastPro
          fi
          
          # Şu anki dizini kaydet
          echo "PWD=$(pwd)" >> $GITHUB_ENV
          echo "=== Current directory ==="
          pwd
          ls -la

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Setup Android SDK and NDK
        run: |
          mkdir -p android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip
          mv cmdline-tools android-sdk/cmdline-tools/latest
          export ANDROID_HOME=$PWD/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          sdkmanager "ndk;25.1.8937393"
          sdkmanager "cmake;3.22.1"
          
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.1.8937393" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          # ScreenCastPro klasörü varsa içine gir
          if [ -d "ScreenCastPro" ]; then
            cd ScreenCastPro
          fi
          gradle assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            ScreenCastPro/app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/debug/*.apk
            **/app/build/outputs/apk/debug/*.apk
